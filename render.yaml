services:
  - type: web
    name: finance-access-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install; npm run build
    startCommand: npm run prisma:deploy; npm run seed; npm run start
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 22.18.0
      - key: DATABASE_URL
        value: file:./dev.db
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 12h
      - key: CORS_ORIGIN
        sync: false
      - key: PORT
        value: 10000
